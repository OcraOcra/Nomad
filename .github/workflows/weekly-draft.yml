name: Weekly Draft

on:
  schedule:
    # Lunes 8:00 AM Costa Rica (UTC-6) = 14:00 UTC
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m nomad weekly --force

      - name: Upload draft
        uses: actions/upload-artifact@v4
        with:
          name: weekly-draft
          path: data/drafts/*.md
          retention-days: 30

      - name: Commit history
        run: |
          git config user.name "Nomad bot"
          git config user.email "bot@nomad.cr"
          git add data/drafts/ data/history/published.json
          git diff --staged --quiet || (git commit -m "weekly: $(date +%Y-%m-%d)" && git push)
